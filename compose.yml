services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: research-agent:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CONVERSATION_DB_PATH: /app/data/research_agent.sqlite3
    volumes:
      - ./data:/app/data
    restart: unless-stopped
